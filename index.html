<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Encomendas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: #667eea;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            width: 55px;
            height: 55px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .stat-info h3 {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-info .number {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        /* Form */
        .form-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .form-container h2 {
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            margin-bottom: 8px;
            color: #555;
        }

        .form-group input, .form-group select {
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-primary, .btn-secondary {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102,126,234,0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s;
            color: #666;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        /* Search */
        .search-box {
            margin-bottom: 20px;
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }

        /* Orders Grid */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s;
            position: relative;
            border-left: 4px solid #667eea;
        }

        .order-card.atrasado {
            border-left-color: #ef4444;
            background: #fef2f2;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge.pendente {
            background: #fef3c7;
            color: #92400e;
        }

        .badge.andamento {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge.entregue {
            background: #d1fae5;
            color: #065f46;
        }

        .order-card h3 {
            margin-bottom: 15px;
            color: #333;
            font-size: 18px;
            padding-right: 80px;
        }

        .info {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
            color: #666;
            font-size: 14px;
        }

        .info i {
            width: 20px;
            color: #667eea;
        }

        .late-warning {
            background: #fee2e2;
            color: #dc2626;
            padding: 8px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
            text-align: center;
        }

        /* Card Actions - Botões pequenos */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 18px;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: 0.3s;
        }

        .icon-btn:hover {
            transform: scale(1.08);
        }

        .edit-btn {
            background: #dbeafe;
            color: #1e40af;
        }

        .delete-btn {
            background: #fee2e2;
            color: #dc2626;
        }

        .empty {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 15px;
            color: #999;
        }

        .empty i {
            font-size: 64px;
            margin-bottom: 20px;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .orders-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-box"></i>
                Minhas Encomendas
            </h1>
            <div class="subtitle">Gerencie suas entregas de forma eficiente</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="stat-info">
                    <h3>Total Encomendas</h3>
                    <div class="number" id="totalOrders">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-info">
                    <h3>Pendentes</h3>
                    <div class="number" id="pendingOrders">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-info">
                    <h3>Em Andamento</h3>
                    <div class="number" id="progressOrders">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-info">
                    <h3>Entregues</h3>
                    <div class="number" id="deliveredOrders">0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
                <div class="stat-info">
                    <h3>Faturamento Mensal</h3>
                    <div class="number" id="monthlyRevenue">R$ 0</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-file-invoice"></i></div>
                <div class="stat-info">
                    <h3>Pedidos no Mês</h3>
                    <div class="number" id="monthlyOrders">0</div>
                </div>
            </div>
        </div>

        <div class="form-container">
            <h2><i class="fas fa-plus-circle"></i> Nova Encomenda</h2>
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div class="form-grid">
                    <div class="form-group">
                        <label>Cliente</label>
                        <input type="text" id="clientName" required placeholder="Nome do cliente">
                    </div>
                    <div class="form-group">
                        <label>Produto</label>
                        <input type="text" id="product" required placeholder="Nome do produto">
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" id="value" required placeholder="0,00">
                    </div>
                    <div class="form-group">
                        <label>Data do Pedido</label>
                        <input type="date" id="orderDate" required>
                    </div>
                    <div class="form-group">
                        <label>Data de Entrega</label>
                        <input type="date" id="deliveryDate" required>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="status">
                            <option>Pendente</option>
                            <option>Em andamento</option>
                            <option>Entregue</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Salvar Encomenda</button>
                    <button type="button" id="cancelEdit" class="btn-secondary">Cancelar</button>
                </div>
            </form>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="all">Todas</button>
            <button class="tab-btn" data-tab="Pendente">Pendentes</button>
            <button class="tab-btn" data-tab="Em andamento">Em Andamento</button>
        </div>

        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Buscar por cliente ou produto...">
        </div>

        <div id="ordersContainer" class="orders-grid"></div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('orders-manager')) || [];
        let historyOrders = JSON.parse(localStorage.getItem('orders-history')) || [];
        let financialHistory = JSON.parse(localStorage.getItem('financial-history')) || [];
        let currentTab = 'all';
        let currentSearch = '';

        function saveAll() {
            localStorage.setItem('orders-manager', JSON.stringify(orders));
            localStorage.setItem('orders-history', JSON.stringify(historyOrders));
            localStorage.setItem('financial-history', JSON.stringify(financialHistory));
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        }

        function formatDate(date) {
            return new Date(date).toLocaleDateString('pt-BR');
        }

        function addFinancialHistory(order) {
            financialHistory.push({
                id: Date.now(),
                client: order.clientName,
                product: order.product,
                value: order.value,
                date: new Date().toISOString()
            });
        }

        function updateStats() {
            const total = orders.length;
            const pendentes = orders.filter(o => o.status === 'Pendente').length;
            const andamento = orders.filter(o => o.status === 'Em andamento').length;
            const entregues = historyOrders.length;
            const totalFinanceiro = financialHistory.reduce((acc, item) => acc + Number(item.value || 0), 0);
            
            document.getElementById('totalOrders').textContent = total;
            document.getElementById('pendingOrders').textContent = pendentes;
            document.getElementById('progressOrders').textContent = andamento;
            document.getElementById('deliveredOrders').textContent = entregues;
            document.getElementById('monthlyRevenue').textContent = formatCurrency(totalFinanceiro);
            document.getElementById('monthlyOrders').textContent = financialHistory.length;
        }

        function isOrderLate(order) {
            if (order.status === 'Entregue') return false;
            const hoje = new Date();
            const entrega = new Date(order.deliveryDate);
            hoje.setHours(0, 0, 0, 0);
            entrega.setHours(0, 0, 0, 0);
            return entrega < hoje;
        }

        function filterOrders() {
            let filtered = orders;
            if (currentTab !== 'all') {
                filtered = filtered.filter(order => order.status === currentTab);
            }
            if (currentSearch) {
                filtered = filtered.filter(order => 
                    order.clientName.toLowerCase().includes(currentSearch.toLowerCase()) || 
                    order.product.toLowerCase().includes(currentSearch.toLowerCase())
                );
            }
            return filtered;
        }

        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            const filteredOrders = filterOrders();
            
            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="empty">
                        <i class="fas fa-inbox"></i>
                        <h3>Nenhuma encomenda</h3>
                    </div>
                `;
                updateStats();
                return;
            }
            
            container.innerHTML = filteredOrders.map(order => {
                const late = isOrderLate(order);
                const statusClass = order.status === 'Pendente' ? 'pendente' : 
                                   order.status === 'Em andamento' ? 'andamento' : 'entregue';
                return `
                    <div class="order-card ${late ? 'atrasado' : ''}">
                        <span class="badge ${statusClass}">${order.status}</span>
                        <h3>${order.clientName}</h3>
                        <div class="info">
                            <i class="fas fa-box"></i>
                            <span><strong>Produto:</strong> ${order.product}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-money-bill"></i>
                            <span><strong>Valor:</strong> ${formatCurrency(order.value)}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-calendar"></i>
                            <span><strong>Pedido:</strong> ${formatDate(order.orderDate)}</span>
                        </div>
                        <div class="info">
                            <i class="fas fa-truck"></i>
                            <span><strong>Entrega:</strong> ${formatDate(order.deliveryDate)}</span>
                        </div>
                        ${late ? `<div class="late-warning">⚠ Pedido atrasado</div>` : ''}
                        <div class="card-actions">
                            <button class="icon-btn edit-btn" onclick="editOrder('${order.id}')" title="Editar">
                                <i class="fas fa-pen"></i>
                            </button>
                            <button class="icon-btn delete-btn" onclick="deleteOrder('${order.id}')" title="Excluir">
                                <i class="fas fa-trash"></i>
                            </button>
                            <button class="icon-btn" style="background:#d1fae5;color:#065f46;" onclick="finishOrder('${order.id}')" title="Finalizar">
                                <i class="fas fa-check"></i>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
            updateStats();
        }

        function finishOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            order.status = 'Entregue';
            historyOrders.unshift(order);
            addFinancialHistory(order);
            orders = orders.filter(o => o.id !== id);
            saveAll();
            renderOrders();
            alert('✅ Encomenda finalizada e salva no histórico!');
        }

        function editOrder(id) {
            const order = orders.find(o => o.id === id);
            if (!order) return;
            document.getElementById('orderId').value = order.id;
            document.getElementById('clientName').value = order.clientName;
            document.getElementById('product').value = order.product;
            document.getElementById('value').value = order.value;
            document.getElementById('orderDate').value = order.orderDate;
            document.getElementById('deliveryDate').value = order.deliveryDate;
            document.getElementById('status').value = order.status;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteOrder(id) {
            if (confirm('❌ Excluir encomenda permanentemente?')) {
                orders = orders.filter(o => o.id !== id);
                saveAll();
                renderOrders();
            }
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const orderId = document.getElementById('orderId').value;
            const orderData = {
                id: orderId || Date.now().toString(),
                clientName: document.getElementById('clientName').value,
                product: document.getElementById('product').value,
                value: parseFloat(document.getElementById('value').value),
                orderDate: document.getElementById('orderDate').value,
                deliveryDate: document.getElementById('deliveryDate').value,
                status: document.getElementById('status').value
            };
            
            if (orderId) {
                const index = orders.findIndex(o => o.id === orderId);
                orders[index] = orderData;
            } else {
                orders.unshift(orderData);
            }
            
            saveAll();
            renderOrders();
            this.reset();
            document.getElementById('orderId').value = '';
        });

        document.getElementById('cancelEdit').addEventListener('click', () => {
            document.getElementById('orderForm').reset();
            document.getElementById('orderId').value = '';
        });

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentTab = this.dataset.tab;
                renderOrders();
            });
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            currentSearch = e.target.value;
            renderOrders();
        });

        // Inicializar
        renderOrders();
    </script>
</body>
</html>
