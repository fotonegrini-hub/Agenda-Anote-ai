<!DOCTYPE html> <html lang="pt-BR"> <head> <meta charset="UTF-8" /> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Minhas Encomendas PRO</title> <link rel="preconnect" href="https://fonts.googleapis.com"> <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin> <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"> <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"> <style> *{ margin:0; padding:0; box-sizing:border-box; } :root{ --primary:#4361ee; --primary-dark:#3a0ca3; --success:#06d6a0; --warning:#f9c74f; --danger:#f94144; --gray-100:#f8f9fa; --gray-200:#e9ecef; --gray-600:#6c757d; --gray-800:#2b2d42; --radius:18px; --shadow:0 10px 30px rgba(0,0,0,.1); } body{ font-family:'Poppins',sans-serif; background:linear-gradient(135deg,#667eea,#764ba2); min-height:100vh; padding:25px; } .container{ max-width:1400px; margin:auto; } .header{ background:rgba(255,255,255,.95); backdrop-filter:blur(10px); border-radius:var(--radius); padding:25px; margin-bottom:25px; box-shadow:var(--shadow); } .header-top{ display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap; } .title h1{ font-size:2rem; font-weight:800; color:var(--primary-dark); } .title p{ color:var(--gray-600); margin-top:5px; } .stats{ display:flex; gap:15px; flex-wrap:wrap; } .stat-card{ background:white; border-radius:16px; padding:18px 22px; min-width:140px; text-align:center; cursor:pointer; transition:.3s; box-shadow:0 5px 15px rgba(0,0,0,.06); } .stat-card:hover{ transform:translateY(-5px); } .stat-card h3{ font-size:1.8rem; color:var(--primary); } .stat-card p{ font-size:.85rem; color:var(--gray-600); font-weight:600; margin-top:5px; } .revenue-card{ background:linear-gradient(135deg,#06d6a0,#118ab2); } .revenue-card h3, .revenue-card p{ color:white; } .card{ background:rgba(255,255,255,.97); border-radius:var(--radius); padding:30px; margin-bottom:25px; box-shadow:var(--shadow); } .form-title{ font-size:1.4rem; font-weight:700; color:var(--primary-dark); margin-bottom:20px; } form{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:18px; } .form-group{ display:flex; flex-direction:column; } label{ font-size:.82rem; margin-bottom:8px; color:var(--gray-600); font-weight:600; } input, select{ padding:12px 14px; border:2px solid var(--gray-200); border-radius:12px; font-family:'Poppins'; } input:focus, select:focus{ outline:none; border-color:var(--primary); } .btn-area{ grid-column:1/-1; display:flex; gap:15px; flex-wrap:wrap; } .btn{ border:none; padding:14px 20px; border-radius:12px; font-weight:600; cursor:pointer; transition:.3s; } .btn-primary{ background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; } .btn-primary:hover{ transform:translateY(-2px); } .btn-secondary{ background:#ddd; } .tabs-nav{ display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; } .tab-btn{ border:none; padding:12px 18px; border-radius:12px; background:#eee; cursor:pointer; font-weight:600; transition:.3s; } .tab-btn.active{ background:var(--primary); color:white; } .search-box{ margin-bottom:25px; } .search-box input{ width:100%; } .orders-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(350px,1fr)); gap:20px; } .order-card{ background:white; border-radius:18px; padding:22px; position:relative; box-shadow:0 5px 20px rgba(0,0,0,.06); transition:.3s; } .order-card:hover{ transform:translateY(-5px); } .order-card.atrasado{ border-left:5px solid var(--danger); } .badge{ position:absolute; top:18px; right:18px; padding:6px 12px; border-radius:20px; color:white; font-size:.72rem; font-weight:700; } .badge.pendente{ background:var(--warning); color:#333; } .badge.andamento{ background:var(--primary); } .badge.entregue{ background:var(--success); } .order-card h3{ margin-bottom:15px; padding-right:100px; } .info{ margin:10px 0; color:var(--gray-600); display:flex; gap:10px; align-items:center; } .info strong{ color:var(--gray-800); } .late-warning{ background:#ffe8e8; color:var(--danger); padding:10px; border-radius:10px; margin-top:15px; font-size:.85rem; font-weight:600; } .card-actions{ display:flex; gap:10px; margin-top:20px; } .icon-btn{ flex:1; border:none; padding:10px; border-radius:10px; cursor:pointer; font-weight:600; transition:.3s; } .edit-btn{ background:#e3f2fd; color:#1976d2; } .delete-btn{ background:#ffebee; color:var(--danger); } .edit-btn:hover{ background:#1976d2; color:white; } .delete-btn:hover{ background:var(--danger); color:white; } .empty{ text-align:center; padding:50px; color:#777; } @media(max-width:768px){ body{ padding:15px; } .header-top{ flex-direction:column; align-items:flex-start; } .orders-grid{ grid-template-columns:1fr; } } </style> </head> <body> <div class="container"> <div class="header"> <div class="header-top"> <div class="title"> <h1><i class="fas fa-boxes"></i> Minhas Encomendas</h1> <p>Controle profissional de encomendas</p> </div> <div class="stats"> <div class="stat-card" data-filter="all"> <h3 id="totalOrders">0</h3> <p>Total</p> </div> <div class="stat-card" data-filter="pendente"> <h3 id="pendingOrders">0</h3> <p>Pendentes</p> </div> <div class="stat-card" data-filter="andamento"> <h3 id="progressOrders">0</h3> <p>Andamento</p> </div> <div class="stat-card" data-filter="entregue"> <h3 id="deliveredOrders">0</h3> <p>Entregues</p> </div> <div class="stat-card revenue-card"> <h3 id="monthlyRevenue">R$ 0,00</h3> <p>Total do Mês</p> </div> <div class="stat-card revenue-card"> <h3 id="monthlyOrders">0</h3> <p>Pedidos do Mês</p> </div> </div> </div> </div> <div class="card"> <div class="form-title"> <i class="fas fa-plus-circle"></i> Nova Encomenda </div> <form id="orderForm"> <input type="hidden" id="orderId"> <div class="form-group"> <label>Cliente</label> <input type="text" id="clientName" required> </div> <div class="form-group"> <label>Produto</label> <input type="text" id="product" required> </div> <div class="form-group"> <label>Valor</label> <input type="number" id="value" step="0.01" required> </div> <div class="form-group"> <label>Data Pedido</label> <input type="date" id="orderDate" required> </div> <div class="form-group"> <label>Entrega</label> <input type="date" id="deliveryDate" required> </div> <div class="form-group"> <label>Status</label> <select id="status"> <option value="Pendente">Pendente</option> <option value="Em andamento">Em andamento</option> <option value="Entregue">Entregue</option> </select> </div> <div class="btn-area"> <button type="submit" class="btn btn-primary"> <i class="fas fa-save"></i> Salvar </button> <button type="button" class="btn btn-secondary" id="cancelEdit"> Cancelar </button> </div> </form> </div> <div class="card"> <div class="tabs-nav"> <button class="tab-btn active" data-tab="all"> Todas </button> <button class="tab-btn" data-tab="Pendente"> Pendentes </button> <button class="tab-btn" data-tab="Em andamento"> Andamento </button> <button class="tab-btn" data-tab="Entregue"> Entregues </button> </div> <div class="search-box"> <input type="text" id="searchInput" placeholder="Pesquisar..."> </div> <div class="orders-grid" id="ordersContainer"></div> </div> </div> <script> let orders = JSON.parse(localStorage.getItem('orders-manager')) || []; let currentTab = 'all'; let currentSearch = ''; function saveToLocalStorage(){ localStorage.setItem('orders-manager',JSON.stringify(orders)); } function formatCurrency(value){ return new Intl.NumberFormat('pt-BR',{ style:'currency', currency:'BRL' }).format(value); } function formatDate(date){ return new Date(date).toLocaleDateString('pt-BR'); } function atualizarFinanceiroMensal(){ const hoje = new Date(); const mesAtual = hoje.getMonth(); const anoAtual = hoje.getFullYear(); const pedidosMes = orders.filter(order=>{ const data = new Date(order.orderDate); return data.getMonth() === mesAtual && data.getFullYear() === anoAtual; }); const totalMes = pedidosMes.reduce((acc,order)=>{ return acc + Number(order.value || 0); },0); document.getElementById('monthlyRevenue').textContent = formatCurrency(totalMes); document.getElementById('monthlyOrders').textContent = pedidosMes.length; salvarHistoricoMensal(totalMes,pedidosMes.length); } function salvarHistoricoMensal(total,quantidade){ const hoje = new Date(); const chave = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0'); const historico = JSON.parse(localStorage.getItem('historico-mensal')) || {}; historico[chave]={ total, quantidade, atualizado:new Date().toISOString() }; localStorage.setItem( 'historico-mensal', JSON.stringify(historico) ); } function updateStats(){ const total = orders.length; const pendentes = orders.filter(o=>o.status==='Pendente').length; const andamento = orders.filter(o=>o.status==='Em andamento').length; const entregues = orders.filter(o=>o.status==='Entregue').length; document.getElementById('totalOrders').textContent = total; document.getElementById('pendingOrders').textContent = pendentes; document.getElementById('progressOrders').textContent = andamento; document.getElementById('deliveredOrders').textContent = entregues; atualizarFinanceiroMensal(); } function isOrderLate(order){ if(order.status==='Entregue') return false; const hoje = new Date(); const entrega = new Date(order.deliveryDate); hoje.setHours(0,0,0,0); entrega.setHours(0,0,0,0); return entrega < hoje; } function filterOrders(){ let filtered = orders; if(currentTab !== 'all'){ filtered = filtered.filter( order => order.status === currentTab ); } if(currentSearch){ filtered = filtered.filter(order => order.clientName.toLowerCase() .includes(currentSearch.toLowerCase()) || order.product.toLowerCase() .includes(currentSearch.toLowerCase()) ); } return filtered; } function renderOrders(){ const container = document.getElementById('ordersContainer'); const filteredOrders = filterOrders(); if(filteredOrders.length === 0){ container.innerHTML = ` <div class="empty"> <i class="fas fa-inbox"></i> <h3>Nenhuma encomenda</h3> </div> `; updateStats(); return; } container.innerHTML = filteredOrders.map(order=>{ const late = isOrderLate(order); const statusClass = order.status === 'Pendente' ? 'pendente' : order.status === 'Em andamento' ? 'andamento' : 'entregue'; return ` <div class="order-card ${late ? 'atrasado':''}"> <span class="badge ${statusClass}"> ${order.status} </span> <h3>${order.clientName}</h3> <div class="info"> <i class="fas fa-box"></i> <span><strong>Produto:</strong> ${order.product}</span> </div> <div class="info"> <i class="fas fa-money-bill"></i> <span><strong>Valor:</strong> ${formatCurrency(order.value)}</span> </div> <div class="info"> <i class="fas fa-calendar"></i> <span><strong>Pedido:</strong> ${formatDate(order.orderDate)}</span> </div> <div class="info"> <i class="fas fa-truck"></i> <span><strong>Entrega:</strong> ${formatDate(order.deliveryDate)}</span> </div> ${late ? ` <div class="late-warning"> ⚠ Pedido atrasado </div> `:''} <div class="card-actions"> <button class="icon-btn edit-btn" onclick="editOrder('${order.id}')"> <i class="fas fa-edit"></i> Editar </button> <button class="icon-btn delete-btn" onclick="deleteOrder('${order.id}')"> <i class="fas fa-trash"></i> Excluir </button> </div> </div> `; }).join(''); updateStats(); } function editOrder(id){ const order = orders.find(o=>o.id===id); if(!order) return; document.getElementById('orderId').value = order.id; document.getElementById('clientName').value = order.clientName; document.getElementById('product').value = order.product; document.getElementById('value').value = order.value; document.getElementById('orderDate').value = order.orderDate; document.getElementById('deliveryDate').value = order.deliveryDate; document.getElementById('status').value = order.status; window.scrollTo({ top:0, behavior:'smooth' }); } function deleteOrder(id){ if(confirm('Excluir encomenda?')){ orders = orders.filter(o=>o.id!==id); saveToLocalStorage(); renderOrders(); } } document.getElementById('orderForm') .addEventListener('submit',function(e){ e.preventDefault(); const orderId = document.getElementById('orderId').value; const orderData = { id: orderId || Date.now().toString(), clientName: document.getElementById('clientName').value, product: document.getElementById('product').value, value: parseFloat( document.getElementById('value').value ), orderDate: document.getElementById('orderDate').value, deliveryDate: document.getElementById('deliveryDate').value, status: document.getElementById('status').value }; if(orderId){ const index = orders.findIndex(o=>o.id===orderId); orders[index] = orderData; }else{ orders.unshift(orderData); } saveToLocalStorage(); renderOrders(); this.reset(); document.getElementById('orderId').value=''; }); document.getElementById('cancelEdit') .addEventListener('click',()=>{ document.getElementById('orderForm').reset(); document.getElementById('orderId').value=''; }); document.querySelectorAll('.tab-btn') .forEach(btn=>{ btn.addEventListener('click',function(){ document.querySelectorAll('.tab-btn') .forEach(b=>b.classList.remove('active')); this.classList.add('active'); currentTab = this.dataset.tab; renderOrders(); }); }); document.querySelectorAll('.stat-card') .forEach(card=>{ card.addEventListener('click',function(){ const filter = this.dataset.filter; let tabToActivate='all'; if(filter==='pendente'){ tabToActivate='Pendente'; } else if(filter==='andamento'){ tabToActivate='Em andamento'; } else if(filter==='entregue'){ tabToActivate='Entregue'; } document.querySelectorAll('.tab-btn') .forEach(btn=>{ if(btn.dataset.tab===tabToActivate){ btn.click(); document.querySelector('.tabs-nav') .scrollIntoView({ behavior:'smooth' }); } }); }); }); document.getElementById('searchInput') .addEventListener('input',function(e){ currentSearch = e.target.value; renderOrders(); }); renderOrders(); </script> </body> </html>
